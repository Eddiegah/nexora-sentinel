# docker-compose.yml
# Runs the entire Nexora Sentinel stack with one command
# Usage: docker-compose up

version: '3.8'

services:

  # ── BACKEND API ─────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nexora-backend
    ports:
      - "8000:8000"        # Map container port 8000 to host port 8000
    volumes:
      - ./data:/app/data          # Share data folder with container
      - ./ml:/app/ml              # Share ml folder with container
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FRONTEND DASHBOARD ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: nexora-frontend
    ports:
      - "3000:80"          # Map container port 80 to host port 3000
    depends_on:
      - backend            # Wait for backend to start first
    restart: unless-stopped
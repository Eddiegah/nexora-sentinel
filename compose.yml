version: '3.8'

services:
  db:
    image: postgres:15
    container_name: nexora-db
    environment:
      POSTGRES_DB: nexora
      POSTGRES_USER: nexora_user
      POSTGRES_PASSWORD: nexora_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nexora-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./ml:/app/ml
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://nexora_user:nexora_pass@db:5432/nexora
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: nexora-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: